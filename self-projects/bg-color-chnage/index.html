<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>background color change</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
       <div class="main flex justify-center items-center h-screen gap-4">
            <div id="red" class="btn flex justify-center items-center w-[120px] h-[120px] bg-red-600
             rounded-full border-[2px] border-black cursor-pointer"></div>

             <div id="blue" class="btn flex justify-center items-center w-[120px] h-[120px] bg-blue-500
             rounded-full border-[2px] border-black cursor-pointer"></div>

             <div id="yellow" class="btn flex justify-center items-center w-[120px] h-[120px] bg-yellow-400
             rounded-full border-[2px] border-black cursor-pointer"></div>

              <div id="white" class="btn flex justify-center items-center w-[120px] h-[120px] bg-white
             rounded-full border-[2px] border-black cursor-pointer"></div>
       </div>


       <script src="app.js"></script>
</body>
</html>
